server {
    listen 80;
    server_name rustchain.org www.rustchain.org;

    # ... Existing proxy rules ...
    
    # NEW: Beacon Atlas reverse proxy routes
    # For UI: rustchain.org/beacon/atlas -> 127.0.0.1:8071/beacon/atlas
    # For API: rustchain.org/beacon/join -> 127.0.0.1:8071/beacon/join
    location /beacon/ {
        proxy_pass http://127.0.0.1:8071/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
